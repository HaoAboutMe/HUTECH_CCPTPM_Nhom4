<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="/css/register.css">
</head>
<body>
<div id="toastNotification" class="toast-notification" role="status" aria-live="polite"></div>
<main class="register-page">
    <h1 class="register-title">Đăng Ký</h1>

    <section class="register-card" aria-label="Form đăng ký">
        <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
        <form class="register-form" action="/register" method="post" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="Nhập email của bạn" autocomplete="email" required>
            </div>

            <div class="form-group with-icon">
                <label for="password">Mật Khẩu</label>
                <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" autocomplete="new-password" required>
                <button class="icon-btn" type="button" aria-label="Hiển thị mật khẩu" aria-pressed="false" tabindex="-1">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M3 3L21 21"></path>
                        <path d="M10.58 10.58A2 2 0 0013.42 13.42"></path>
                        <path d="M9.88 4.24A9.87 9.87 0 0112 4c5 0 9.27 3.11 11 8-1.05 2.97-3.09 5.3-5.67 6.58"></path>
                        <path d="M6.61 6.61C4.62 7.9 3.07 9.79 2 12c1.73 4.89 6 8 10 8a9.9 9.9 0 004.24-.96"></path>
                    </svg>
                </button>
            </div>

            <div class="form-group with-icon">
                <label for="confirmPassword">Xác Nhận Mật Khẩu</label>
                <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Xác nhận mật khẩu" autocomplete="new-password" required>
                <button class="icon-btn" type="button" aria-label="Hiển thị xác nhận mật khẩu" aria-pressed="false" tabindex="-1">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M3 3L21 21"></path>
                        <path d="M10.58 10.58A2 2 0 0013.42 13.42"></path>
                        <path d="M9.88 4.24A9.87 9.87 0 0112 4c5 0 9.27 3.11 11 8-1.05 2.97-3.09 5.3-5.67 6.58"></path>
                        <path d="M6.61 6.61C4.62 7.9 3.07 9.79 2 12c1.73 4.89 6 8 10 8a9.9 9.9 0 004.24-.96"></path>
                    </svg>
                </button>
            </div>

            <div class="form-group">
                <label for="dob">Ngày Sinh</label>
                <input id="dob" name="dob" type="date" autocomplete="bday" required>
                <small class="field-hint">Bạn có thể nhập trực tiếp hoặc bấm biểu tượng lịch để chọn ngày.</small>
            </div>

            <button class="register-btn" type="submit">Đăng Ký</button>
        </form>
    </section>
</main>
<script>
    (function () {
        var toastElement = document.getElementById('toastNotification');
        var messageElement = document.getElementById('formMessage');
        var searchParams = new URLSearchParams(window.location.search);
        var success = searchParams.get('success');
        var error = searchParams.get('error');
        var toastTimer;

        function showToast(message, type) {
            if (!toastElement) {
                return;
            }

            if (toastTimer) {
                window.clearTimeout(toastTimer);
            }

            toastElement.textContent = message;
            toastElement.className = 'toast-notification show ' + (type || 'success');

            toastTimer = window.setTimeout(function () {
                toastElement.classList.remove('show');
            }, 2600);
        }

        if (!messageElement) {
            return;
        }

        if (success === '1') {
            showToast('Đăng ký thành công', 'success');
            window.history.replaceState({}, document.title, window.location.pathname);
            return;
        }

        if (error === 'password_mismatch') {
            messageElement.textContent = 'Mật khẩu và xác nhận mật khẩu chưa khớp';
            messageElement.classList.add('error');
        } else if (error === 'email_exists') {
            messageElement.textContent = 'Email này đã tồn tại';
            messageElement.classList.add('error');
        } else if (error === 'invalid_input') {
            messageElement.textContent = 'Vui lòng nhập đầy đủ thông tin';
            messageElement.classList.add('error');
        }
    })();

    document.querySelectorAll('.form-group.with-icon').forEach(function (group) {
        var input = group.querySelector('input');
        var button = group.querySelector('.icon-btn');

        if (!input || !button) {
            return;
        }

        button.addEventListener('click', function () {
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            button.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
            button.setAttribute(
                'aria-label',
                isHidden ? 'Ẩn mật khẩu' : 'Hiển thị mật khẩu'
            );
        });
    });
</script>
</body>
</html>
