spring:
  application:
    name: webbanmaytinh

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
      multipart:
        enabled: true
        max-file-size: 10MB
        max-request-size: 10MB

server:
  port: 8080
