services:
  db:
    ports:
      - "3307:3306"
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webbanmaytinh
    volumes:
      - db_data:/var/lib/mysql
  app:
    image: nguyenlehoanhao/webbanmaytinh-compose
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/webbanmaytinh?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: